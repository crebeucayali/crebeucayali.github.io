name: Copiar CSS consolidado a rama final

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  copiar:
    if: github.head_ref == 'consolidacion-ancho-cuadriculas-final'
    runs-on: ubuntu-latest

    steps:
      - name: Copiar únicamente estilos.css validado
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          ORIGEN=$(gh api "/repos/$REPO/contents/estilos.css?ref=consolidacion-ancho-cuadriculas" --jq '.content' | tr -d '\n')
          DESTINO=$(gh api "/repos/$REPO/contents/estilos.css?ref=consolidacion-ancho-cuadriculas-final" --jq '.content' | tr -d '\n')

          if [ "$ORIGEN" = "$DESTINO" ]; then
            echo "El CSS consolidado ya está copiado."
            exit 0
          fi

          SHA_DESTINO=$(gh api "/repos/$REPO/contents/estilos.css?ref=consolidacion-ancho-cuadriculas-final" --jq '.sha')
          gh api --method PUT "/repos/$REPO/contents/estilos.css" \
            -f message='Consolida el ancho general y las cuadrículas' \
            -f branch='consolidacion-ancho-cuadriculas-final' \
            -f sha="$SHA_DESTINO" \
            -f content="$ORIGEN"
