name: Consolidación portada Shipibo

on:
  push:
    branches:
      - consolidacion-portada-shipibo

permissions:
  contents: write

jobs:
  consolidar-portada:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          ref: consolidacion-portada-shipibo
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Consolidar reglas de la portada Shipibo
        run: python scripts/consolidar_portada_shipibo.py

      - name: Verificar formato del cambio
        run: git diff --check

      - name: Confirmar que solo cambia estilos.css
        run: |
          CAMBIOS=$(git diff --name-only)
          if [ "$CAMBIOS" != "estilos.css" ]; then
            echo "Se detectaron cambios fuera de estilos.css:"
            echo "$CAMBIOS"
            exit 1
          fi

      - name: Publicar consolidación
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add estilos.css
          git commit -m "Consolida las reglas de la portada Shipibo"
          git push origin HEAD:consolidacion-portada-shipibo
