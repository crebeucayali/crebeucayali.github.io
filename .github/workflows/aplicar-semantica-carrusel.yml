name: Aplicar semántica del carrusel de noticias

on:
  push:
    branches:
      - semantica-carrusel-noticias

permissions:
  contents: write

jobs:
  aplicar:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Descargar rama
        uses: actions/checkout@v4
        with:
          ref: semantica-carrusel-noticias
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Aplicar cambio limitado
        run: python scripts/ajustar_semantica_carrusel.py

      - name: Validar JavaScript y alcance
        run: |
          node --check main.js
          git diff --check
          CAMBIADOS=$(git diff --name-only | sort)
          ESPERADOS=$(printf 'index.html\nmain.js')
          if [ "$CAMBIADOS" != "$ESPERADOS" ]; then
            echo "Archivos inesperados modificados:"
            echo "$CAMBIADOS"
            exit 1
          fi
          grep -q 'role="region" aria-roledescription="carrusel" aria-labelledby="noticias-destacadas-titulo"' index.html
          grep -q 'aria-controls="noticias-pista"' index.html
          grep -q 'aria-roledescription", "diapositiva"' main.js
          grep -q 'slide.setAttribute("aria-hidden", estaActiva ? "false" : "true")' main.js
          grep -q 'enlaceNoticia.setAttribute("tabindex", "-1")' main.js

      - name: Publicar ajuste validado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html main.js
          git commit -m "Mejora la semántica del carrusel de noticias"
          git push origin HEAD:semantica-carrusel-noticias
