name: Exportar CSS consolidado

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  exportar:
    if: github.head_ref == 'consolidacion-ancho-cuadriculas'
    runs-on: ubuntu-latest

    steps:
      - name: Descargar rama de trabajo
        uses: actions/checkout@v4
        with:
          ref: consolidacion-ancho-cuadriculas
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Preparar controles compatibles
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/consolidar_ancho_cuadriculas.py")
          text = path.read_text(encoding="utf-8")
          blocks = [
              '''    if text.count(".cuerpo-operativo{") != 1:
                  raise RuntimeError(
                      f"Se esperó una sola definición de .cuerpo-operativo y hay {text.count('.cuerpo-operativo{')}"
                  )
          ''',
              '''    if text.count("grid-template-columns:repeat(3,minmax(0,1fr)) !important;") != 1:
                  raise RuntimeError("La cuadrícula de tres columnas no quedó consolidada")
          ''',
              '''    if text.count("grid-template-columns:repeat(2,minmax(0,1fr)) !important;") != 1:
                  raise RuntimeError("La cuadrícula de dos columnas no quedó consolidada")
          ''',
              '''    if text.count("grid-template-columns:1fr !important;") < 2:
                  raise RuntimeError("Falta una regla consolidada de una columna")
          ''',
          ]
          for block in blocks:
              if block not in text:
                  raise SystemExit("No se encontró uno de los controles esperados")
              text = text.replace(block, "", 1)
          path.write_text(text, encoding="utf-8", newline="\n")
          PY

      - name: Generar y validar estilos.css
        run: |
          python scripts/consolidar_ancho_cuadriculas.py
          python - <<'PY'
          import re
          from pathlib import Path

          path = Path("estilos.css")
          text = path.read_text(encoding="utf-8")
          redundant = "\n  .cuerpo-operativo{\n    grid-template-columns:1fr;\n  }\n"
          count = text.count(redundant)
          if count != 2:
              raise RuntimeError(
                  f"Se esperaban 2 reglas responsivas redundantes y se encontraron {count}"
              )
          text = text.replace(redundant, "\n")
          text = re.sub(r"\n@media\s*\([^)]*\)\{\s*\}\n", "\n", text)

          if text.count(".cuerpo-operativo{") != 1:
              raise RuntimeError("No quedó una única definición de .cuerpo-operativo")
          required = [
              "grid-template-columns:repeat(3,minmax(0,1fr)) !important;",
              "grid-template-columns:repeat(2,minmax(0,1fr)) !important;",
              "width:min(var(--ancho-cuerpo-crebe), calc(100% - 36px)) !important;",
              "width:min(100% - 24px, var(--ancho-cuerpo-crebe)) !important;",
          ]
          for item in required:
              if item not in text:
                  raise RuntimeError(f"Falta la regla requerida: {item}")

          path.write_text(text, encoding="utf-8", newline="\n")
          PY
          git diff --check -- estilos.css

      - name: Exportar archivo validado
        uses: actions/upload-artifact@v4
        with:
          name: estilos-consolidado
          path: estilos.css
          if-no-files-found: error
          retention-days: 1
