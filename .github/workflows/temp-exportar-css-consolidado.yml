name: Aplicar CSS consolidado

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write

jobs:
  aplicar:
    if: github.head_ref == 'consolidacion-ancho-cuadriculas'
    runs-on: ubuntu-latest

    steps:
      - name: Descargar rama de trabajo
        uses: actions/checkout@v4
        with:
          ref: consolidacion-ancho-cuadriculas
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Comprobar si la consolidación ya fue aplicada
        id: estado
        shell: bash
        run: |
          if grep -q -- '--ancho-cuerpo-crebe:1120px;' estilos.css && ! grep -q 'Ajuste final de ancho del cuerpo' estilos.css; then
            echo "aplicado=true" >> "$GITHUB_OUTPUT"
            echo "La consolidación ya está aplicada."
          else
            echo "aplicado=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Preparar controles compatibles
        if: steps.estado.outputs.aplicado != 'true'
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/consolidar_ancho_cuadriculas.py")
          text = path.read_text(encoding="utf-8")
          blocks = [
              '''    if text.count(".cuerpo-operativo{") != 1:
                  raise RuntimeError(
                      f"Se esperó una sola definición de .cuerpo-operativo y hay {text.count('.cuerpo-operativo{')}"
                  )
          ''',
              '''    if text.count("grid-template-columns:repeat(3,minmax(0,1fr)) !important;") != 1:
                  raise RuntimeError("La cuadrícula de tres columnas no quedó consolidada")
          ''',
              '''    if text.count("grid-template-columns:repeat(2,minmax(0,1fr)) !important;") != 1:
                  raise RuntimeError("La cuadrícula de dos columnas no quedó consolidada")
          ''',
              '''    if text.count("grid-template-columns:1fr !important;") < 2:
                  raise RuntimeError("Falta una regla consolidada de una columna")
          ''',
          ]
          for block in blocks:
              if block not in text:
                  raise SystemExit("No se encontró uno de los controles esperados")
              text = text.replace(block, "", 1)
          path.write_text(text, encoding="utf-8", newline="\n")
          PY

      - name: Generar y validar estilos.css
        if: steps.estado.outputs.aplicado != 'true'
        run: |
          python scripts/consolidar_ancho_cuadriculas.py
          python - <<'PY'
          import re
          from pathlib import Path

          path = Path("estilos.css")
          text = path.read_text(encoding="utf-8")
          redundant = "\n  .cuerpo-operativo{\n    grid-template-columns:1fr;\n  }\n"
          count = text.count(redundant)
          if count != 1:
              raise RuntimeError(
                  f"Se esperaba 1 regla responsiva redundante y se encontraron {count}"
              )
          text = text.replace(redundant, "\n", 1)
          text = re.sub(r"\n@media\s*\([^)]*\)\{\s*\}\n", "\n", text)

          if text.count(".cuerpo-operativo{") != 2:
              raise RuntimeError(
                  "Deben permanecer la definición base y el ajuste móvil agrupado de .cuerpo-operativo"
              )
          required = [
              "grid-template-columns:repeat(3,minmax(0,1fr)) !important;",
              "grid-template-columns:repeat(2,minmax(0,1fr)) !important;",
              "width:min(var(--ancho-cuerpo-crebe), calc(100% - 36px)) !important;",
              "width:min(100% - 24px, var(--ancho-cuerpo-crebe)) !important;",
          ]
          for item in required:
              if item not in text:
                  raise RuntimeError(f"Falta la regla requerida: {item}")

          if text.count("--ancho-cuerpo-crebe:1120px;") != 1:
              raise RuntimeError("La variable de ancho no quedó definida una sola vez")
          if "Ajuste final de ancho del cuerpo" in text:
              raise RuntimeError("Permaneció el bloque final de sobrescrituras")

          depth = 0
          quote = None
          i = 0
          while i < len(text):
              char = text[i]
              if quote:
                  if char == "\\":
                      i += 2
                      continue
                  if char == quote:
                      quote = None
                  i += 1
                  continue
              if text.startswith("/*", i):
                  end = text.find("*/", i + 2)
                  if end == -1:
                      raise RuntimeError("Comentario CSS sin cierre")
                  i = end + 2
                  continue
              if char in {'"', "'"}:
                  quote = char
              elif char == "{":
                  depth += 1
              elif char == "}":
                  depth -= 1
                  if depth < 0:
                      raise RuntimeError("Llave CSS de cierre sin apertura")
              i += 1
          if depth != 0:
              raise RuntimeError(f"Llaves CSS desbalanceadas: {depth}")

          path.write_text(text, encoding="utf-8", newline="\n")
          print("CSS consolidado y validado estructuralmente.")
          PY

      - name: Actualizar únicamente estilos.css en la rama
        if: steps.estado.outputs.aplicado != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          SHA_ACTUAL=$(gh api "/repos/$REPO/contents/estilos.css?ref=consolidacion-ancho-cuadriculas" --jq '.sha')
          CONTENIDO=$(base64 -w 0 estilos.css)
          gh api --method PUT "/repos/$REPO/contents/estilos.css" \
            -f message='Consolida el ancho general y las cuadrículas' \
            -f branch='consolidacion-ancho-cuadriculas' \
            -f sha="$SHA_ACTUAL" \
            -f content="$CONTENIDO"
