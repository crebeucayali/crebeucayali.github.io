name: Validación temporal de ancho y cuadrículas

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write

jobs:
  consolidar:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'consolidacion-ancho-cuadriculas'
    runs-on: ubuntu-latest

    steps:
      - name: Descargar rama de trabajo
        uses: actions/checkout@v4
        with:
          ref: consolidacion-ancho-cuadriculas
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Preparar validación estricta del cuerpo consolidado
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/consolidar_ancho_cuadriculas.py")
          text = path.read_text(encoding="utf-8")
          blocks = [
              '''    if text.count(".cuerpo-operativo{") != 1:
                  raise RuntimeError(
                      f"Se esperó una sola definición de .cuerpo-operativo y hay {text.count('.cuerpo-operativo{')}"
                  )
          ''',
              '''    if text.count("grid-template-columns:repeat(3,minmax(0,1fr)) !important;") != 1:
                  raise RuntimeError("La cuadrícula de tres columnas no quedó consolidada")
          ''',
              '''    if text.count("grid-template-columns:repeat(2,minmax(0,1fr)) !important;") != 1:
                  raise RuntimeError("La cuadrícula de dos columnas no quedó consolidada")
          ''',
              '''    if text.count("grid-template-columns:1fr !important;") < 2:
                  raise RuntimeError("Falta una regla consolidada de una columna")
          ''',
          ]
          for block in blocks:
              if block not in text:
                  raise SystemExit("No se encontró uno de los controles esperados del script")
              text = text.replace(block, "", 1)
          path.write_text(text, encoding="utf-8", newline="\n")
          PY

      - name: Ejecutar consolidación y postproceso
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python scripts/consolidar_ancho_cuadriculas.py > /tmp/consolidacion-ancho.log 2>&1
          ESTADO=$?

          if [ "$ESTADO" -eq 0 ]; then
            python - <<'PY' >> /tmp/consolidacion-ancho.log 2>&1
            import re
            from pathlib import Path

            path = Path("estilos.css")
            text = path.read_text(encoding="utf-8")
            redundant = "\n  .cuerpo-operativo{\n    grid-template-columns:1fr;\n  }\n"
            count = text.count(redundant)
            if count != 2:
                raise RuntimeError(
                    f"Se esperaban 2 reglas responsivas redundantes de .cuerpo-operativo y hay {count}"
                )
            text = text.replace(redundant, "\n")
            text = re.sub(r"\n@media\s*\([^)]*\)\{\s*\}\n", "\n", text)

            if text.count(".cuerpo-operativo{") != 1:
                raise RuntimeError("No quedó una única definición de .cuerpo-operativo")
            required = [
                "grid-template-columns:repeat(3,minmax(0,1fr)) !important;",
                "grid-template-columns:repeat(2,minmax(0,1fr)) !important;",
                "width:min(var(--ancho-cuerpo-crebe), calc(100% - 36px)) !important;",
                "width:min(100% - 24px, var(--ancho-cuerpo-crebe)) !important;",
            ]
            for item in required:
                if item not in text:
                    raise RuntimeError(f"Falta la regla consolidada requerida: {item}")

            path.write_text(text, encoding="utf-8", newline="\n")
            print("Reglas responsivas redundantes de .cuerpo-operativo retiradas: 2")
            print("Validación estructural de anchos y cuadrículas completada.")
            PY
            ESTADO=$?
          fi

          echo "$ESTADO" > /tmp/consolidacion-status
          cat /tmp/consolidacion-ancho.log
          exit "$ESTADO"

      - name: Publicar resultado validado
        if: always()
        shell: bash
        run: |
          ESTADO=$(cat /tmp/consolidacion-status 2>/dev/null || echo 99)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$ESTADO" -ne 0 ]; then
            mkdir -p docs
            {
              cat /tmp/consolidacion-ancho.log 2>/dev/null || true
              echo
              echo "Ocurrencias actuales de .cuerpo-operativo:"
              grep -n '^[[:space:]]*\.cuerpo-operativo{' estilos.css || true
            } > docs/consolidacion-ancho-error.log
            git add docs/consolidacion-ancho-error.log
            git commit -m "Actualiza diagnóstico temporal de la consolidación"
            git pull --rebase origin consolidacion-ancho-cuadriculas
            git push origin HEAD:consolidacion-ancho-cuadriculas
            exit 1
          fi

          git checkout -- scripts/consolidar_ancho_cuadriculas.py
          git diff --check
          CAMBIADOS=$(git diff --name-only)
          echo "Archivos modificados:"
          echo "$CAMBIADOS"
          if [ "$CAMBIADOS" != "estilos.css" ]; then
            echo "Se detectaron archivos inesperados"
            exit 1
          fi
          if git diff --quiet -- estilos.css; then
            echo "No se generaron cambios en estilos.css"
            exit 1
          fi
          git add estilos.css
          git commit -m "Consolida el ancho general y las cuadrículas"
          git pull --rebase origin consolidacion-ancho-cuadriculas
          git push origin HEAD:consolidacion-ancho-cuadriculas
