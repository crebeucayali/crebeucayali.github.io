name: Ajuste final consolidación Shipibo

on:
  push:
    branches:
      - consolidacion-portada-shipibo

permissions:
  contents: write

jobs:
  ajustar:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: consolidacion-portada-shipibo
      - name: Conservar el espaciado efectivo del contenido
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('estilos.css')
          text = path.read_text(encoding='utf-8')
          old = '''.hero .hero-contenido{
            width:100%;
            max-width:var(--ancho-principal);
            margin:0 auto;
            position:relative !important;
            z-index:2 !important;
          }'''.replace('          ', '')
          new = '''.hero .hero-contenido{
            width:100%;
            max-width:var(--ancho-principal);
            margin:0 auto;
            position:relative !important;
            z-index:2 !important;
            padding-top:0 !important;
          }'''.replace('          ', '')
          if text.count(old) != 1:
              raise SystemExit('No se encontró de forma única el bloque consolidado de hero-contenido.')
          path.write_text(text.replace(old, new, 1), encoding='utf-8', newline='\n')
          PY
      - name: Verificar y publicar
        run: |
          git diff --check
          test "$(git diff --name-only)" = "estilos.css"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add estilos.css
          git commit -m "Conserva el espaciado final de la portada Shipibo"
          git push origin HEAD:consolidacion-portada-shipibo
