name: Aplicar Google Analytics

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/add-google-analytics.yml

permissions:
  contents: write

jobs:
  aplicar-etiqueta:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Insertar etiqueta de Google Analytics
        shell: python
        run: |
          from pathlib import Path

          ruta = Path("index.html")
          contenido = ruta.read_text(encoding="utf-8")
          identificador = "G-MX25TYBSQP"

          etiqueta = '''
          <!-- Google tag (gtag.js) -->
          <script async src="https://www.googletagmanager.com/gtag/js?id=G-MX25TYBSQP"></script>
          <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());

            gtag('config', 'G-MX25TYBSQP');
          </script>
          '''

          if identificador not in contenido:
              contenido = contenido.replace("<head>", "<head>\n" + etiqueta.strip("\n"), 1)
              ruta.write_text(contenido, encoding="utf-8")

      - name: Eliminar flujo temporal
        run: rm -f .github/workflows/add-google-analytics.yml

      - name: Confirmar cambio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/add-google-analytics.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Agregar Google Analytics a la página de inicio"
          git push
