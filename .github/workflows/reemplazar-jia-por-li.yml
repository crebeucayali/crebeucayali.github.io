name: Reemplazar JIA por LI

on:
  push:
    paths:
      - '.github/workflows/reemplazar-jia-por-li.yml'

permissions:
  contents: write

jobs:
  actualizar-inicio:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Reemplazar tarjeta JIA por LI
        shell: python
        run: |
          from pathlib import Path
          import json

          index_path = Path('index.html')
          html = index_path.read_text(encoding='utf-8')

          tarjeta_jia = '''<a class="tarjeta juegos" href="https://crebeucayali.github.io/juegos-interactivos-accesibles/" rel="noopener" target="_blank">
          <div class="numero">JIA</div>
          <h3>Juegos Interactivos Accesibles</h3>
          <p>Actividades lúdicas digitales para fortalecer la atención, memoria, asociación, comprensión, participación y aprendizaje.</p>
          <span class="boton">Ingresar a juegos</span>
          </a>'''

          tarjeta_li = '''<a class="tarjeta juegos" href="https://crebeucayali.github.io/lectura-inclusiva/" rel="noopener" target="_blank">
          <div class="numero">LI</div>
          <h3>Lectura Inclusiva</h3>
          <p>Espacio de lectura con artículos breves, orientaciones y contenidos relacionados con la inclusión educativa y la atención a la diversidad.</p>
          <span class="boton">Ingresar a Lectura Inclusiva</span>
          </a>'''

          if tarjeta_jia not in html:
              raise SystemExit('No se encontró la tarjeta exacta de JIA en index.html')

          html = html.replace(tarjeta_jia, tarjeta_li, 1)
          html = html.replace('Ejemplo: materiales, juegos, braille, noticias', 'Ejemplo: materiales, lectura, braille, noticias')
          html = html.replace('data-consulta="juegos">juegos</button>', 'data-consulta="lectura">lectura</button>')
          html = html.replace('CAP, BDA, MEA, JIA, NI y RA', 'CAP, BDA, MEA, LI, NI y RA')
          index_path.write_text(html, encoding='utf-8')

          busqueda_path = Path('busqueda.json')
          datos = json.loads(busqueda_path.read_text(encoding='utf-8'))
          nuevos = []
          li_insertado = False
          for item in datos:
              if item.get('modulo') == 'JIA':
                  if not li_insertado:
                      nuevos.append({
                          'titulo': 'Lectura Inclusiva',
                          'modulo': 'LI',
                          'tipo': 'Módulo',
                          'descripcion': 'Artículos breves, orientaciones y contenidos sobre inclusión educativa y atención a la diversidad.',
                          'url': 'https://crebeucayali.github.io/lectura-inclusiva/',
                          'etiquetas': 'lectura inclusiva articulos orientaciones inclusion educativa diversidad reflexion contenidos accesibles'
                      })
                      li_insertado = True
                  continue
              nuevos.append(item)
          busqueda_path.write_text(json.dumps(nuevos, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          main_path = Path('main.js')
          js = main_path.read_text(encoding='utf-8')
          js = js.replace('materiales, juegos, braille, señas, noticias o contacto', 'materiales, lectura, braille, señas, noticias o contacto')
          js = js.replace('capacitaciones, banco digital, materiales, juegos, noticias y repositorio accesible', 'capacitaciones, banco digital, materiales, lectura inclusiva, noticias y repositorio accesible')
          main_path.write_text(js, encoding='utf-8')

          workflow = Path('.github/workflows/reemplazar-jia-por-li.yml')
          if workflow.exists():
              workflow.unlink()

      - name: Confirmar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html busqueda.json main.js .github/workflows/reemplazar-jia-por-li.yml
          git commit -m "Reemplazar módulo JIA por Lectura Inclusiva en inicio"
          git push
