name: Depuración CSS prioridad 2

on:
  push:
    branches:
      - depuracion-css-prioridad-2

permissions:
  contents: write

jobs:
  depurar-css:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          ref: depuracion-css-prioridad-2
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Retirar reglas administrativas sin uso
        run: python scripts/depurar_css_obsoleto.py

      - name: Verificar formato del cambio
        run: git diff --check

      - name: Confirmar y publicar la depuración
        run: |
          if git diff --quiet -- estilos.css; then
            echo "No se generaron cambios en estilos.css"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add estilos.css
          git commit -m "Elimina estilos administrativos sin uso comprobado"
          git push origin HEAD:depuracion-css-prioridad-2
