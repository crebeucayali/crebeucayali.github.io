name: Aplicar mejora del diálogo guiado

on:
  push:
    branches:
      - mejora-dialogo-recorrido-guiado

permissions:
  contents: write

jobs:
  aplicar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar rama
        uses: actions/checkout@v4
        with:
          ref: mejora-dialogo-recorrido-guiado
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Comprobar si el cambio ya está aplicado
        id: estado
        shell: bash
        run: |
          if grep -q 'aria-describedby", "guia-texto' main.js && grep -q 'regionesFondo' main.js; then
            echo 'aplicado=true' >> "$GITHUB_OUTPUT"
          else
            echo 'aplicado=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Aplicar mejora exacta
        if: steps.estado.outputs.aplicado != 'true'
        run: python scripts/mejorar_dialogo_recorrido.py

      - name: Validar alcance y sintaxis básica
        if: steps.estado.outputs.aplicado != 'true'
        shell: bash
        run: |
          git diff --check -- main.js
          grep -q 'panel.setAttribute("aria-describedby", "guia-texto")' main.js
          grep -q 'region.setAttribute("inert", "")' main.js
          grep -q 'region.removeAttribute("inert")' main.js
          grep -q 'evento.key === "Tab"' main.js
          if [ "$(git status --short)" != " M main.js" ]; then
            git status --short
            exit 1
          fi

      - name: Publicar únicamente main.js
        if: steps.estado.outputs.aplicado != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          SHA=$(gh api "/repos/$REPO/contents/main.js?ref=mejora-dialogo-recorrido-guiado" --jq '.sha')
          CONTENIDO=$(base64 -w 0 main.js)
          gh api --method PUT "/repos/$REPO/contents/main.js" \
            -f message='Mejora la accesibilidad del diálogo del recorrido guiado' \
            -f branch='mejora-dialogo-recorrido-guiado' \
            -f sha="$SHA" \
            -f content="$CONTENIDO"
